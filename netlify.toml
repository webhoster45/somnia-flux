[build]
  base      = "vault-ui"
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  # VAULT_ADDRESS is a public blockchain contract address, not a secret.
  # Omit it from secrets scanning to prevent false-positive build failures.
  SECRETS_SCAN_OMIT_KEYS = "VAULT_ADDRESS"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
